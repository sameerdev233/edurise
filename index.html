<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EduRise Bihar Board</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- LOGIN PAGE -->

<div id="authPage">

<div class="logo">
📚 EduRise
</div>

<div class="auth-box">

<h2>Create Account</h2>

<input id="signupName" placeholder="Student Name">

<select id="signupClass">
<option value="">Select Class</option>
<option>Class 10 Bihar Board</option>
<option>Class 11 Bihar Board</option>
<option>Class 12 Bihar Board</option>
</select>

<button onclick="signup()">
Create Account
</button>


<hr>


<h2>Login</h2>

<input id="loginName" placeholder="Enter Name">

<button onclick="login()">
Login
</button>


</div>

</div>




<!-- MAIN WEBSITE -->


<div id="mainPage" style="display:none;">


<header>

<div class="logo">
📚 EduRise
</div>


<button onclick="openProfile()">
Profile
</button>

</header>



<section class="dashboard">

<h1 id="welcome">
Welcome Student
</h1>


<div class="stats">

<div>
🔥
<p>Daily Streak</p>
<span id="streak">0</span>
</div>


<div>
🏆
<p>Score</p>
<span id="score">0</span>
</div>


<div>
🥇
<p>Rank</p>
<span id="rank">-</span>
</div>


</div>


</section>





<section class="classes">


<h2>Select Class</h2>


<div class="cards">


<div class="card" onclick="showSubjects('10')">
Class 10
<br>
Bihar Board
</div>


<div class="card" onclick="showSubjects('11')">
Class 11
<br>
Bihar Board
</div>


<div class="card" onclick="showSubjects('12')">
Class 12
<br>
Bihar Board
</div>


</div>


</section>






<section id="subjectPage" style="display:none;">


<h2 id="classTitle"></h2>


<div id="subjects"></div>


</section>






<section id="studyPage" style="display:none;">


<h2 id="subjectTitle"></h2>


<button onclick="openNotes()">
📚 Notes
</button>


<button onclick="openPYQ()">
📄 PYQ
</button>


<button onclick="openQuestions()">
⭐ Important Questions
</button>


<button onclick="openQuiz()">
🎯 Quiz
</button>


</section>






<section id="contentBox">

</section>






<section class="leaderboard">


<h2>🏆 Leaderboard</h2>


<table>


<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>


<tbody id="leaderboard">

</tbody>


</table>


</section>




</div>




<script src="script.js"></script>


</body>
</html>
