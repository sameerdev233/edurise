<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EduRise - Learn & Rise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Poppins',sans-serif;background:#f4f9fc;color:#1e293b}:root{--blue:#2563eb;--green:#10b981;--gradient-main:linear-gradient(135deg,#2563eb,#10b981);--shadow:0 10px 30px rgba(37,99,235,0.15);--radius:16px}.container{max-width:1200px;margin:0 auto;padding:20px}.section{display:none;animation:fadeUp .4s ease}.section.active{display:block}@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.navbar{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);padding:12px 0;position:sticky;top:0;z-index:100;border-bottom:2px solid rgba(37,99,235,0.1)}.nav-container{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center}.logo{display:flex;align-items:center;gap:10px;font-size:1.8rem;font-weight:800;background:var(--gradient-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.nav-actions{display:flex;align-items:center;gap:15px}.user-greeting{font-weight:600;color:#475569}.btn-login,.btn-logout{padding:8px 20px;border:none;border-radius:50px;font-weight:600;cursor:pointer}.btn-login{background:var(--gradient-main);color:#fff}.btn-logout{background:#fee2e2;color:#dc2626}.hero{text-align:center;padding:40px 0}.hero h1{font-size:3rem}.highlight{background:var(--gradient-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.search-box{max-width:600px;margin:0 auto 40px;background:#fff;border-radius:60px;padding:6px 6px 6px 25px;display:flex;align-items:center;box-shadow:var(--shadow);border:2px solid transparent}.search-box:focus-within{border-color:var(--blue)}.search-box input{flex:1;border:none;padding:16px 15px;font-size:1rem;outline:none;background:transparent}.quick-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-bottom:40px}.quick-grid button{padding:14px 28px;border:none;border-radius:60px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px}.btn-class{background:#e0f2fe;color:#1e40af}.btn-notes{background:#d1fae5;color:#059669}.btn-quiz{background:#fef3c7;color:#b45309}.btn-primary{padding:16px 40px;border:none;border-radius:60px;background:var(--gradient-main);color:#fff;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:12px}.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.section-header h2{font-size:2rem}.btn-back{padding:10px 25px;border:2px solid #e2e8f0;border-radius:50px;background:#fff;font-weight:600;cursor:pointer}.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:25px}.note-card{background:#fff;padding:25px;border-radius:var(--radius);box-shadow:var(--shadow);border-left:6px solid var(--blue)}.note-card .class-tag{display:inline-block;padding:4px 14px;border-radius:50px;background:var(--gradient-main);color:#fff;font-size:.75rem;margin-top:10px}.quiz-box{background:#fff;border-radius:var(--radius);padding:35px;box-shadow:var(--shadow);max-width:800px;margin:0 auto}.quiz-options{display:flex;flex-direction:column;gap:12px}.quiz-options button{padding:16px 20px;border:2px solid #e2e8f0;border-radius:12px;background:#fff;font-size:1rem;text-align:left;cursor:pointer}.quiz-options button.correct{border-color:var(--green);background:#d1fae5}.quiz-options button.wrong{border-color:#ef4444;background:#fee2e2}.quiz-result .score-big{font-size:4rem;font-weight:800;background:var(--gradient-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.leaderboard-table{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;max-width:700px;margin:0 auto}.leaderboard-table th{background:var(--gradient-main);color:#fff;padding:16px 20px;text-align:left}.leaderboard-table td{padding:14px 20px;border-bottom:1px solid #f1f5f9}.gold-row td{background:#fef3c7}.silver-row td{background:#f1f5f9}.bronze-row td{background:#fef2e0}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:999}.modal.show{display:flex}.modal-content{background:#fff;padding:45px 40px;border-radius:var(--radius);max-width:420px;width:90%;text-align:center}.modal-content input{width:100%;padding:16px 20px;border:2px solid #e2e8f0;border-radius:60px;font-size:1rem;margin-bottom:20px}.modal-close{float:right;font-size:2rem;cursor:pointer}@media(max-width:768px){.hero h1{font-size:2rem}.quick-grid button{padding:10px 16px}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-graduation-cap"></i> EduRise</div>
            <div class="nav-actions">
                <span id="userDisplay" class="user-greeting">Guest</span>
                <button id="loginBtn" class="btn-login"><i class="fas fa-user"></i> Login</button>
                <button id="logoutBtn" class="btn-logout" style="display:none;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>
    <main class="container">
        <section id="home-section" class="section active">
            <div class="hero">
                <h1>Welcome to <span class="highlight">EduRise</span></h1>
                <p>Your gateway to smart learning.</p>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search notes...">
                </div>
                <div class="quick-grid">
                    <button class="btn-class" data-class="10"><i class="fas fa-book-open"></i> Class 10</button>
                    <button class="btn-class" data-class="11"><i class="fas fa-book-open"></i> Class 11</button>
                    <button class="btn-class" data-class="12"><i class="fas fa-book-open"></i> Class 12</button>
                    <button id="notesNavBtn" class="btn-notes"><i class="fas fa-sticky-note"></i> Notes</button>
                    <button id="quizNavBtn" class="btn-quiz"><i class="fas fa-puzzle-piece"></i> Quiz</button>
                </div>
                <button id="startLearningBtn" class="btn-primary"><i class="fas fa-rocket"></i> Start Learning</button>
            </div>
        </section>
        <section id="notes-section" class="section">
            <div class="section-header"><h2><i class="fas fa-sticky-note"></i> Notes</h2><button class="btn-back" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button></div>
            <div id="notesGrid" class="notes-grid"></div>
        </section>
        <section id="quiz-section" class="section">
            <div class="section-header"><h2><i class="fas fa-puzzle-piece"></i> Quiz</h2><button class="btn-back" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button></div>
            <div id="quizContainer"></div>
        </section>
        <section id="leaderboard-section" class="section">
            <div class="section-header"><h2><i class="fas fa-trophy"></i> Leaderboard</h2><button class="btn-back" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button></div>
            <div id="leaderboardContainer"></div>
        </section>
    </main>
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h3>Welcome to EduRise</h3>
            <input type="text" id="studentNameInput" placeholder="Your name">
            <button id="loginSubmitBtn" class="btn-primary">Start Journey</button>
        </div>
    </div>
    <script>
        const notesData=[{id:1,class:10,subject:'Maths',title:'Quadratic Equations'},{id:2,class:10,subject:'Science',title:'Chemical Reactions'},{id:3,class:11,subject:'Physics',title:'Laws of Motion'},{id:4,class:11,subject:'Chemistry',title:'Atomic Structure'},{id:5,class:12,subject:'Maths',title:'Calculus'},{id:6,class:12,subject:'English',title:'Writing Skills'}];
        const quizQuestions=[{question:'2 + 2 × 2 = ?',options:['6','8','4','2'],correct:0},{question:'Red Planet?',options:['Venus','Mars','Jupiter','Saturn'],correct:1},{question:'Water formula?',options:['H2O','CO2','NaCl','HCl'],correct:0},{question:'Relativity theory by?',options:['Newton','Einstein','Hawking','Tesla'],correct:1},{question:'√144 = ?',options:['10','11','12','13'],correct:2}];
        let currentUser=localStorage.getItem('edurise_user')||'Guest';let leaderboard=JSON.parse(localStorage.getItem('edurise_leaderboard'))||[];let currentClassFilter=null;let currentQuizIndex=0;let quizScore=0;let isQuizFinished=false;
        const $=id=>document.getElementById(id);const home=$('home-section'),notes=$('notes-section'),quiz=$('quiz-section'),board=$('leaderboard-section');
        window.showHome=function(){document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));home.classList.add('active');renderNotes()};
        window.showNotes=function(f){currentClassFilter=f;document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));notes.classList.add('active');renderNotes(f)};
        window.showQuiz=function(){currentQuizIndex=0;quizScore=0;isQuizFinished=false;document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));quiz.classList.add('active');renderQuiz()};
        window.showLeaderboard=function(){document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));board.classList.add('active');renderLeaderboard()};
        function renderNotes(f){let d=[...notesData];if(f)d=d.filter(n=>n.class===f);const q=$('searchInput').value.trim().toLowerCase();if(q)d=d.filter(n=>n.title.toLowerCase().includes(q)||n.subject.toLowerCase().includes(q));$('notesGrid').innerHTML=d.length?d.map(n=>`<div class="note-card"><h3>${n.title}</h3><p>${n.subject}</p><span class="class-tag">Class ${n.class}</span></div>`).join(''):'<div class="empty-state">No notes</div>'}
        function renderQuiz(){if(isQuizFinished||currentQuizIndex>=quizQuestions.length){showQuizResult();return}const q=quizQuestions[currentQuizIndex];$('quizContainer').innerHTML=`<div class="quiz-box"><div class="quiz-header"><span>Q${currentQuizIndex+1}/${quizQuestions.length}</span><span>Score:${quizScore}</span></div><div class="quiz-question">${q.question}</div><div class="quiz-options">${q.options.map((o,i)=>`<button data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div></div>`;document.querySelectorAll('.quiz-options button').forEach(b=>{b.onclick=function(){const s=parseInt(this.dataset.idx);const c=quizQuestions[currentQuizIndex].correct;const isCorrect=s===c;if(isCorrect)quizScore++;document.querySelectorAll('.quiz-options button').forEach((btn,idx)=>{btn.disabled=true;if(idx===c)btn.classList.add('correct');if(idx===s&&!isCorrect)btn.classList.add('wrong')});setTimeout(()=>{currentQuizIndex++;if(currentQuizIndex>=quizQuestions.length){isQuizFinished=true;if(currentUser!=='Guest'){leaderboard.push({name:currentUser,score:quizScore,date:new Date().toLocaleDateString()});const map=new Map();leaderboard.forEach(item=>{if(!map.has(item.name)||map.get(item.name).score<item.score)map.set(item.name,item)});leaderboard=Array.from(map.values());leaderboard.sort((a,b)=>b.score-a.score);localStorage.setItem('edurise_leaderboard',JSON.stringify(leaderboard))}renderQuiz()}else renderQuiz()},1200)}})}
        function showQuizResult(){const t=quizQuestions.length;$('quizContainer').innerHTML=`<div class="quiz-box"><div class="quiz-result"><div class="score-big">${quizScore}/${t}</div><p>${Math.round(quizScore/t*100)}%</p><div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center"><button class="btn-primary" onclick="showHome()">Home</button><button class="btn-primary" onclick="showLeaderboard()">Leaderboard</button><button class="btn-primary" onclick="showQuiz()">Retry</button></div></div></div>`}
        function renderLeaderboard(){if(!leaderboard.length){$('leaderboardContainer').innerHTML='<div class="empty-state">No scores yet. Take the quiz!</div>';return}leaderboard.sort((a,b)=>b.score-a.score);let html='<div class="leaderboard-table"><table><thead><tr><th>Rank</th><th>Student</th><th>Score</th></tr></thead><tbody>';leaderboard.forEach((e,i)=>{let medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;let cls=i===0?'gold-row':i===1?'silver-row':i===2?'bronze-row':'';html+=`<tr class="${cls}"><td>${medal}</td><td>${e.name}</td><td>${e.score}/${quizQuestions.length}</td></tr>`});html+='</tbody></table></div>';$('leaderboardContainer').innerHTML=html}
        $('searchInput').addEventListener('input',function(){if(home.classList.contains('active')){if(this.value.trim())window.showNotes(null);else window.showHome()}else if(notes.classList.contains('active'))renderNotes(currentClassFilter)});
        function updateUI(){if(currentUser&&currentUser!=='Guest'){$('userDisplay').textContent=currentUser;$('loginBtn').style.display='none';$('logoutBtn').style.display='inline-block'}else{$('userDisplay').textContent='Guest';$('loginBtn').style.display='inline-block';$('logoutBtn').style.display='none';currentUser='Guest';localStorage.setItem('edurise_user','Guest')}}
        $('loginBtn').onclick=function(){$('loginModal').classList.add('show')};document.querySelector('.modal-close').onclick=function(){$('loginModal').classList.remove('show')};$('loginModal').onclick=function(e){if(e.target===this)this.classList.remove('show')};$('loginSubmitBtn').onclick=function(){const n=$('studentNameInput').value.trim();if(!n)return alert('Enter name');currentUser=n;localStorage.setItem('edurise_user',n);updateUI();$('loginModal').classList.remove('show')};$('logoutBtn').onclick=function(){if(confirm('Logout?')){currentUser='Guest';localStorage.setItem('edurise_user','Guest');updateUI();window.showHome()}};
        document.querySelectorAll('.btn-class').forEach(b=>{b.onclick=function(){window.showNotes(parseInt(this.dataset.class))}});$('notesNavBtn').onclick=function(){window.showNotes(null)};$('quizNavBtn').onclick=window.showQuiz;$('startLearningBtn').onclick=function(){window.showNotes(null)};
        updateUI();window.showHome();
    </script>
</body>
</html>
