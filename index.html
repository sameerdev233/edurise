<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduRise</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>EduRise</h1>
<p class="tagline">Apni Padhai Ko Banaiye Simple & Effective</p>

<input type="text" placeholder="Search Notes...">

<div class="buttons">
<button>Class 10</button>
<button>Class 11</button>
<button>Class 12</button>
</div>

<div class="buttons">
<button>Notes</button>
<button>Quiz</button>
</div>

<button class="start">Start Learning</button>

<div class="login">
<input type="text" placeholder="Enter Name">
<button>Login</button>
</div>
<div id="quiz">
<h2>Quiz</h2>

<p>1. Bihar ki rajdhani kya hai?</p>

<button onclick="checkAnswer('Patna')">Patna</button>
<button onclick="checkAnswer('Gaya')">Gaya</button>
<button onclick="checkAnswer('Muzaffarpur')">Muzaffarpur</button>

<p id="result"></p>
</div>
<h2>🏆 Leaderboard</h2>

<table>
<tr>
<tr>
    <th>Rank</th>
    <th>Name</th>
    <th>Points</th>
</tr>

<tbody id="leaderboard"></tbody>


</table>

</div>

<script src="script.js"></script>

</body>
</html>
<input type="text" id="username" placeholder="Enter Name">

<button onclick="login()">Login</button>
